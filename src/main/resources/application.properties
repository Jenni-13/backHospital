spring.application.name=hospital

# Configuración de la base de datos MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/hospital_h
spring.datasource.username=root
spring.datasource.password=

# Configuración de bd en servidor
# spring.datasource.url=jdbc:mysql://100.79.9.108:3306/hospital_h
# spring.datasource.username=userB
# spring.datasource.password=h0spit4L$2026!

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration

logging.level.org.hibernate.SQL=debug

server.port=8081
server.address=0.0.0.0

# Configuración de autorización y recursos
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:9000
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=http://localhost:9000/oauth2/jwks

# Documentación de apis
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs

logging.level.org.springframework.security=DEBUG